<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Black Hole Simulation</title>
<style>
body { margin:0; overflow:hidden; background:black; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>
<script>

const scene = new THREE.Scene();
const camera = new THREE.Camera();
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const uniforms = {
    time: { value: 0.0 },
    resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
};

const material = new THREE.ShaderMaterial({

uniforms: uniforms,

fragmentShader: `

uniform float time;
uniform vec2 resolution;

float noise(vec2 p){
    return fract(sin(dot(p, vec2(127.1,311.7))) * 43758.5453123);
}

void main(){

    vec2 uv = (gl_FragCoord.xy / resolution.xy) - 0.5;
    uv.x *= resolution.x / resolution.y;

    float r = length(uv);

    float angle = atan(uv.y, uv.x);

    float swirl = 0.6/(r+0.2);

    angle += swirl * sin(time*0.5);

    vec2 warped;
    warped.x = r*cos(angle);
    warped.y = r*sin(angle);

    float disk = exp(-10.0*abs(r-0.3));

    float glow = 1.0/(r*5.0+0.2);

    float star = noise(warped*40.0+time)*0.8;

    vec3 color = vec3(0.0);

    color += vec3(1.2,0.6,0.1)*disk;     // accretion disk
    color += vec3(0.2,0.4,1.0)*glow;     // gravitational glow
    color += vec3(star);                 // stars

    if(r < 0.15) color *= 0.0;           // event horizon

    gl_FragColor = vec4(color,1.0);
}
`,

vertexShader: `
void main(){
    gl_Position = vec4(position,1.0);
}
`

});

const geometry = new THREE.PlaneGeometry(2,2);
const mesh = new THREE.Mesh(geometry, material);
scene.add(mesh);

function animate(){
    requestAnimationFrame(animate);
    uniforms.time.value += 0.01;
    renderer.render(scene, camera);
}

animate();

</script>
</body>
</html>
